syntax = "proto3";

package branch;
option go_package = "tcc/api/proto/branch";

service BranchService {
  rpc Try(TryRequest) returns (TryResponse);
  rpc Confirm(ConfirmRequest) returns (ConfirmResponse);
  rpc Cancel(CancelRequest) returns (CancelResponse);
}

message TryRequest {
  int64 branch_id = 1;
  string resource_data = 2;
}

message TryResponse {
  bool success = 1;
  string error = 2;
}

message ConfirmRequest {
  int64 branch_id = 1;
  string resource_data = 2;
}

message ConfirmResponse {
  bool success = 1;
  string error = 2;
}

message CancelRequest {
  int64 branch_id = 1;
  string resource_data = 2;
}

message CancelResponse {
  bool success = 1;
  string error = 2;
}
